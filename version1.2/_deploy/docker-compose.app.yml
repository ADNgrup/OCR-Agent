services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kvm-ocr-backend
    restart: unless-stopped
    env_file: .deploy.app.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
    container_name: kvm-ocr-frontend
    restart: unless-stopped
    env_file: .deploy.app.env
    ports:
      - "33039:3000"
    depends_on:
      - backend
